<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="阅读 | Zhiyuan Zhao - 技术文章 & 小说">
  <title id="page-title">阅读 | Zhiyuan Zhao</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/reader-page.css">
</head>
<body>

  <!-- 顶部导航条 -->
  <header class="reader-topbar" id="reader-topbar">
    <div class="reader-topbar-left">
      <a href="index.html" class="reader-back" title="返回博客主页">← 返回博客</a>
      <span class="reader-brand">Zhiyuan Zhao</span>
    </div>
    <span class="reader-type" id="reader-type">文章阅读</span>
  </header>

  <!-- 主体 -->
  <div class="reader-main" id="reader-main">
    <!-- 章节侧边栏（仅小说） -->
    <aside class="reader-sidebar hidden" id="reader-sidebar" aria-label="章节目录">
      <button class="sidebar-toggle" id="sidebar-toggle" title="收起目录">☰ 目录</button>
      <nav class="sidebar-chapters" id="sidebar-chapters"></nav>
    </aside>

    <!-- 正文区 -->
    <article class="reader-body" id="reader-body">
      <div class="reader-progress" id="reader-progress" aria-hidden="true"></div>
      <div class="reader-loading" id="reader-loading">
        <span class="reader-loading-icon">📖</span>
        <p>加载中……</p>
      </div>
    </article>
  </div>

  <script src="js/markdown.js"></script>
  <script src="js/site-data.js"></script>
  <script src="js/reader-page.js"></script>
</body>
</html>
